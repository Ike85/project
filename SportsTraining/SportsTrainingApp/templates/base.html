<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Sports Training{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand text-white" href="/">SportsTraining</a>

    <div>

        {% if user.is_authenticated %}
            <span class="text-white me-2">Hi {{ user.username }}</span>

            <form method="post" action="/logout/" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-outline-light btn-sm">Logout</button>
            </form>

        {% else %}
            <a class="btn btn-outline-light btn-sm" href="/login/">Login</a>
        {% endif %}

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
